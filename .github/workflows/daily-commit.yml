name: Daily Automated Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "23f2002146@ds.study.iitm.ac.in"

      - name: Update timestamp file - 23f2002146@ds.study.iitm.ac.in
        run: |
          echo "Run at $(date +%s)" >> daily_log.txt
          git add daily_log.txt
          git commit -m "Automated daily commit"
          git push
